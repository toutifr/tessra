name = "tessra-tile-worker"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# R2 bucket for tile storage
[[r2_buckets]]
binding = "TILES_BUCKET"
bucket_name = "tessra-tiles"

[vars]
TILE_SIZE = "512"
MAX_ZOOM = "14"

# Secrets (set via `npx wrangler secret put <NAME>`):
# WEBHOOK_SECRET       — shared secret with Supabase trigger
# SUPABASE_URL         — https://epqxxzdfmsuunxlcizkj.supabase.co
# SUPABASE_SERVICE_KEY — service role key
